<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Track Your Progress</title>

    <!-- Font (optional but recommended early) -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="Assets/SHIELDICON.png">
    <link rel="stylesheet" href="Styles/TrackProgress.css" />
  </head>
  <body>
    <div class="progress-page">

      <header>
        <h1>TRACK YOUR PROGRESS</h1>
        <p class="tagline">
          A wise commander studies the battlefield before the next advance.
        </p>
      </header>

      <img src="Assets/Medieval_Strategy.png" class="strategy-map" alt="Medieval strategy map emblem">

      <section class="progress-section">
        <img src="Assets/Laurel_Wreath.png" class="progress-emblem" alt="Laurel wreath">

        <div class="progress-bar">
          <span class="progress-square filled"></span>
          <span class="progress-square filled"></span>
          <span class="progress-square filled"></span>
          <span class="progress-square filled"></span>
          <span class="progress-square filled"></span>
          <span class="progress-square filled"></span>
          <span class="progress-square filled"></span>
          <span class="progress-square"></span>
          <span class="progress-square"></span>
          <span class="progress-square"></span>
        </div>

        <img src="Assets/Cracked_Shield.png" class="progress-emblem" alt="Cracked shield">
      </section>

      <p class="victory-rate">
        Victory rate: <span class="victory-value">70%</span> (?)
      </p>

      <p class="coming-soon">
        More analytics coming soon...
      </p>

    </div>
  </body>
</html>
